<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>wink-event-crm-agent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand" aria-label="Wink Event CRM">
      <span class="brand-wink">wink</span>
      <span class="brand-title" data-i18n="brandTitle">Agent Event</span>
    </div>
    <div class="toolbar">
      <button id="prevMonth" class="icon-button" type="button" aria-label="이전 달" data-i18n-aria="prevMonth">‹</button>
      <input id="monthInput" type="month" value="2026-05">
      <button id="nextMonth" class="icon-button" type="button" aria-label="다음 달" data-i18n-aria="nextMonth">›</button>
      <div class="language-toggle" aria-label="Language">
        <button class="lang-btn" type="button" data-lang="id">Indonesia</button>
        <button class="lang-btn" type="button" data-lang="ko">한국어</button>
      </div>
      <button id="reloadButton" class="primary" type="button" data-i18n="reload">새로고침</button>
    </div>
  </header>

  <div class="app-shell">
    <aside class="sidebar">
      <section class="panel">
        <div class="panel-head">
          <h2 data-i18n="agentPanel">에이전트</h2>
          <span class="pill" data-i18n="selfSelect">본인 선택</span>
        </div>
        <label class="field-label" for="agentSelect" data-i18n="nameLabel">이름</label>
        <select id="agentSelect">
          <option value="">에이전트를 선택하세요</option>
        </select>
        <p class="hint" data-i18n="agentHint">본인 이름을 선택한 뒤 행사 슬롯을 선점하세요.</p>
      </section>

      <section class="panel">
        <h2 data-i18n="myRequests">내 신청</h2>
        <div id="myList" class="stack-list">
          <span class="empty" data-i18n="noRequests">신청한 일정이 없습니다.</span>
        </div>
      </section>

      <section class="panel">
        <h2 data-i18n="dbMissing">DB 미입력</h2>
        <div id="dbMissingList" class="stack-list">
          <span class="empty" data-i18n="none">없음</span>
        </div>
      </section>
    </aside>

    <main class="main">
      <div class="page-head">
        <div>
          <p id="statusLine" class="status-line" data-i18n="loading">달력을 불러오는 중...</p>
          <h1 data-i18n="calendarTitle">행사 선점 달력</h1>
        </div>
        <div class="summary-tabs">
          <button class="summary active" data-filter="open" type="button"><span data-i18n="open">선택 가능</span> <b id="countOpen">0</b></button>
          <button class="summary" data-filter="pending" type="button"><span data-i18n="pending">승인중</span> <b id="countPending">0</b></button>
          <button class="summary" data-filter="approved" type="button"><span data-i18n="approved">승인완료</span> <b id="countApproved">0</b></button>
          <button class="summary" data-filter="db" type="button"><span data-i18n="dbInput">DB 입력</span> <b id="countDb">0</b></button>
        </div>
      </div>

      <section id="calendar" class="calendar" aria-live="polite"></section>
    </main>
  </div>

  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div>
          <h2 id="modalTitle">이벤트</h2>
          <p id="modalMeta"></p>
        </div>
        <button id="modalClose" class="close-button" type="button" aria-label="닫기">×</button>
      </div>
      <div id="slotTable" class="slot-table"></div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
